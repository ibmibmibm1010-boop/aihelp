# Деплой при push в main: SPA (papka2) + воркер helloword.
#
# ВАЖНО: этот workflow НЕ публикует код в «другой репозиторий GitHub».
# Он только checkout ЭТОГО репозитория и заливает сборку в Cloudflare Workers
# в аккаунте, который задан секретами ниже.
#
# Если деплой «не туда»:
# 1) Проверьте секреты именно в ЭТОМ репо: Settings → Secrets → Actions
#    (другой форк/репозиторий — свои секреты; старые значения = старый CF-аккаунт).
# 2) Уточните CLOUDFLARE_ACCOUNT_ID нужного аккаунта Cloudflare и токен с правами на него.
# 3) Имена воркеров в wrangler.toml / wrangler.jsonc (papka2, helloword) — это имена в Cloudflare.
#
# Secrets:
#   CLOUDFLARE_API_TOKEN — только User API Token (префикс cfut_), шаблон «Edit Cloudflare Workers»
#     + User → User Details → Read. НЕ подставляйте Global API Key (cfk_) — Wrangler вернёт 9109.
#     Не используйте Account API Token (cfat_) для Wrangler — часто падает на /memberships.
#   CLOUDFLARE_ACCOUNT_ID — Workers → обзор аккаунта
#   VITE_HELLOWORD_BASE_URL — публичный URL воркера helloword (https://helloword.….workers.dev),
#     без / в конце. Нужен для сборки фронта (ИИ-помощник). См. .env.production.example
#
# VENICE_API_KEY только в Cloudflare: wrangler secret put (не в GitHub).

name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Контекст (откуда код → куда деплой)
        run: |
          echo "Источник кода (этот GitHub-репозиторий): ${GITHUB_REPOSITORY}"
          echo "Ветка: ${GITHUB_REF_NAME}  коммит: ${GITHUB_SHA}"
          echo "Цель: Cloudflare Workers (account_id из секрета CLOUDFLARE_ACCOUNT_ID), не другой GitHub-repo."

      - name: Verify Cloudflare secrets
        run: |
          SECRETS_URL="https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::В этом репозитории не задан секрет CLOUDFLARE_API_TOKEN."
            echo "Откройте: ${SECRETS_URL}"
            echo "New repository secrets → имя: CLOUDFLARE_API_TOKEN → значение: API Token из Cloudflare (Workers: Edit)."
            echo "Создать токен: https://dash.cloudflare.com/profile/api-tokens"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Не задан секрет CLOUDFLARE_ACCOUNT_ID."
            echo "Откройте: ${SECRETS_URL} → New secret → CLOUDFLARE_ACCOUNT_ID"
            echo "Значение: Workers → слева выберите аккаунт → справа «Account ID»."
            exit 1
          fi
          echo "Секреты Cloudflare заданы (значения в лог не выводятся)."

      - name: Проверка токена Cloudflare (не cfk_, валидность verify)
        run: |
          T="${CLOUDFLARE_API_TOKEN}"
          case "$T" in
            cfk_*)
              echo "::error::CLOUDFLARE_API_TOKEN похож на Global API Key (cfk_). Для GitHub Actions нужен User API Token (cfut_)."
              echo "Создать: https://dash.cloudflare.com/profile/api-tokens → Create Token → Edit Cloudflare Workers"
              echo "и добавить право User → User Details → Read. Вставьте значение в Settings → Secrets → Actions."
              exit 1
              ;;
            cfat_*)
              echo "::warning::Сейчас Account API Token (cfat_). Если деплой падает, замените на User API Token (cfut_) с тем же шаблоном прав."
              ;;
          esac
          CODE=$(curl -sS -o /tmp/cf_verify.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          if [ "$CODE" != "200" ]; then
            echo "::error::Cloudflare отклонил токен (HTTP ${CODE}). Обновите CLOUDFLARE_API_TOKEN (cfut_, не cfk_)."
            cat /tmp/cf_verify.json || true
            exit 1
          fi
          if ! grep -q '"success"[[:space:]]*:[[:space:]]*true' /tmp/cf_verify.json; then
            echo "::error::user/tokens/verify вернул success != true:"
            cat /tmp/cf_verify.json
            exit 1
          fi
          echo "Cloudflare API Token: verify OK"

      - run: npm ci

      - name: Build SPA
        env:
          VITE_HELLOWORD_BASE_URL: ${{ secrets.VITE_HELLOWORD_BASE_URL }}
        run: |
          if [ -z "$VITE_HELLOWORD_BASE_URL" ]; then
            echo "::warning::VITE_HELLOWORD_BASE_URL пуст — в проде ИИ не подключится. Задайте секрет в Settings → Secrets → Actions."
          fi
          npm run build

      - name: Wrangler version
        run: npx wrangler --version

      - name: Deploy papka2 (root wrangler.toml)
        run: npx wrangler deploy

      - name: Deploy helloword (--config из корня монорепо)
        run: npx wrangler deploy --config aibddck/helloword/wrangler.jsonc
