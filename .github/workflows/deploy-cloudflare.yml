# Деплой при push в main: SPA (papka2) + воркер helloword.
# Если в репо не заданы CLOUDFLARE_* — job деплоя пропускается (зелёный прогон, в логе notice).
#
# Секrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, (опц.) VITE_HELLOWORD_BASE_URL
#
# Токен для `wrangler deploy` (иначе Authentication error [code: 10000]):
#   • Лучше шаблон «Edit Cloudflare Workers» при создании токена.
#   • Если кастомный токен — обязательно добавьте вручную:
#       User → User Details → Read
#       User → Memberships → Read
#     (без них wrangler пишет «Unable to retrieve email» и падает на /workers/services/…)
#   • Не используйте Global API Key (cfk_) — только User API Token (cfut_).

name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  check-cloudflare-secrets:
    name: Проверка секретов Cloudflare
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.set.outputs.should_deploy }}
    steps:
      - name: Нужен ли деплой
        id: set
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  notify-skip:
    name: Cloudflare (без деплоя)
    needs: check-cloudflare-secrets
    if: needs.check-cloudflare-secrets.outputs.should_deploy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Секреты не заданы — деплой пропущен
        run: |
          echo "::notice title=Cloudflare::Деплой пропущен. Задайте CLOUDFLARE_API_TOKEN и CLOUDFLARE_ACCOUNT_ID в настройках репозитория."
          echo "https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
          echo "Создать токен: https://dash.cloudflare.com/profile/api-tokens (шаблон «Edit Cloudflare Workers», префикс cfut_)."

  deploy:
    name: Деплой в Cloudflare
    needs: check-cloudflare-secrets
    if: needs.check-cloudflare-secrets.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Контекст (откуда код → куда деплой)
        run: |
          echo "Источник кода (этот GitHub-репозиторий): ${GITHUB_REPOSITORY}"
          echo "Ветка: ${GITHUB_REF_NAME}  коммит: ${GITHUB_SHA}"
          echo "Цель: Cloudflare Workers (account_id из секрета CLOUDFLARE_ACCOUNT_ID)."

      - name: Verify Cloudflare tokens present
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Секреты пропали после шага check (не ожидается)."
            exit 1
          fi
          echo "Секреты Cloudflare заданы (значения в лог не выводятся)."

      - name: Проверка токена Cloudflare (валидность + обрезка пробелов в секрете)
        id: cf_token_kind
        run: |
          set -euo pipefail
          # Секрет иногда сохраняют с переводом строки на конце — тогда Bearer невалиден (401).
          TOKEN=$(printf '%s' "${CLOUDFLARE_API_TOKEN}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN пуст (или только пробелы). Обновите секрет."
            exit 1
          fi

          case "${TOKEN}" in
            cfk_*)
              echo "::error::CLOUDFLARE_API_TOKEN похож на Global API Key (cfk_). Для Actions нужен API Token (префикс cfut_ или Account API Token)."
              exit 1
              ;;
          esac

          UW=$(curl -sS -o /tmp/cf_verify.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          UW_OK=no
          if [ "$UW" = "200" ] && grep -q '"success"[[:space:]]*:[[:space:]]*true' /tmp/cf_verify.json; then
            UW_OK=yes
          fi

          AC=$(curl -sS -o /tmp/cf_accounts.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}")

          if [ "$UW_OK" = yes ]; then
            {
              echo "CLOUDFLARE_API_TOKEN<<__CF_EOF__"
              printf '%s\n' "${TOKEN}"
              echo "__CF_EOF__"
            } >> "$GITHUB_ENV"
            echo "token_kind=user" >> "$GITHUB_OUTPUT"
            echo "Cloudflare User API Token: /user/tokens/verify OK"
            exit 0
          fi
          if [ "$AC" = "200" ]; then
            {
              echo "CLOUDFLARE_API_TOKEN<<__CF_EOF__"
              printf '%s\n' "${TOKEN}"
              echo "__CF_EOF__"
            } >> "$GITHUB_ENV"
            echo "token_kind=account" >> "$GITHUB_OUTPUT"
            echo "::notice::Токен валиден как Account-scoped: GET /accounts/{id}. Для только user-verify нужен cfut_, wrangler поддерживает и такой тип."
            exit 0
          fi

          echo "::error::Токен не принят Cloudflare:"
          echo "  • POST user/tokens/verify → HTTP ${UW}"
          cat /tmp/cf_verify.json || true
          echo "  • GET /accounts/${CLOUDFLARE_ACCOUNT_ID} → HTTP ${AC}"
          cat /tmp/cf_accounts.json || true
          echo "::error::Создайте новый User API Token: https://dash.cloudflare.com/profile/api-tokens → шаблон «Edit Cloudflare Workers»"
          echo "Или проверьте CLOUDFLARE_ACCOUNT_ID совпадает с аккаунтом из дашборда (Workers → свой воркер → справа Account ID)."
          echo "Secrets: https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
          exit 1

      - name: User API Token — /user и /memberships для wrangler
        if: steps.cf_token_kind.outputs.token_kind == 'user'
        run: |
          err() {
            echo "::error::$1"
            echo "Добавьте к User API Token: User Details → Read, Memberships → Read:"
            echo "https://dash.cloudflare.com/profile/api-tokens"
            exit 1
          }
          TOKEN=$(printf '%s' "${CLOUDFLARE_API_TOKEN}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          U=$(curl -sS -o /tmp/cf_user.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.cloudflare.com/client/v4/user")
          if [ "$U" != "200" ]; then
            cat /tmp/cf_user.json || true
            err "GET /user → HTTP ${U}."
          fi
          M=$(curl -sS -o /tmp/cf_mem.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.cloudflare.com/client/v4/memberships")
          if [ "$M" != "200" ]; then
            cat /tmp/cf_mem.json || true
            err "GET /memberships → HTTP ${M}."
          fi
          echo "Cloudflare /user и /memberships: OK"

      - run: npm ci

      - name: Wrangler version
        run: npx wrangler --version

      - name: Сборка SPA и деплой papka2 (dist → wrangler)
        env:
          VITE_HELLOWORD_BASE_URL: ${{ secrets.VITE_HELLOWORD_BASE_URL }}
        run: |
          if [ -z "$VITE_HELLOWORD_BASE_URL" ]; then
            echo "::warning::VITE_HELLOWORD_BASE_URL пуст — в проде ИИ не подключится. Задайте секрет в Settings → Secrets → Actions."
          fi
          npm run deploy:cf

      - name: Deploy helloword (--config из корня монорепо)
        run: npx wrangler deploy --config aibddck/helloword/wrangler.jsonc
