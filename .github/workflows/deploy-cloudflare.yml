# Деплой при push в main: SPA (papka2) + воркер helloword.
# Если в репо не заданы CLOUDFLARE_* — job деплоя пропускается (зелёный прогон, в логе notice).
#
# Секrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, (опц.) VITE_HELLOWORD_BASE_URL
# — см. комментарии внизу и Cloudflare / GitHub.

name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  check-cloudflare-secrets:
    name: Проверка секретов Cloudflare
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.set.outputs.should_deploy }}
    steps:
      - name: Нужен ли деплой
        id: set
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  notify-skip:
    name: Cloudflare (без деплоя)
    needs: check-cloudflare-secrets
    if: needs.check-cloudflare-secrets.outputs.should_deploy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Секреты не заданы — деплой пропущен
        run: |
          echo "::notice title=Cloudflare::Деплой пропущен. Задайте CLOUDFLARE_API_TOKEN и CLOUDFLARE_ACCOUNT_ID в настройках репозитория."
          echo "https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
          echo "Создать токен: https://dash.cloudflare.com/profile/api-tokens (шаблон «Edit Cloudflare Workers», префикс cfut_)."

  deploy:
    name: Деплой в Cloudflare
    needs: check-cloudflare-secrets
    if: needs.check-cloudflare-secrets.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Контекст (откуда код → куда деплой)
        run: |
          echo "Источник кода (этот GitHub-репозиторий): ${GITHUB_REPOSITORY}"
          echo "Ветка: ${GITHUB_REF_NAME}  коммит: ${GITHUB_SHA}"
          echo "Цель: Cloudflare Workers (account_id из секрета CLOUDFLARE_ACCOUNT_ID)."

      - name: Verify Cloudflare tokens present
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Секреты пропали после шага check (не ожидается)."
            exit 1
          fi
          echo "Секреты Cloudflare заданы (значения в лог не выводятся)."

      - name: Проверка токена Cloudflare (не cfk_, валидность verify)
        run: |
          T="${CLOUDFLARE_API_TOKEN}"
          case "$T" in
            cfk_*)
              echo "::error::CLOUDFLARE_API_TOKEN похож на Global API Key (cfk_). Для GitHub Actions нужен User API Token (cfut_)."
              echo "Создать: https://dash.cloudflare.com/profile/api-tokens → Create Token → Edit Cloudflare Workers"
              echo "и добавить право User → User Details → Read. Вставьте значение в Settings → Secrets → Actions."
              exit 1
              ;;
            cfat_*)
              echo "::warning::Сейчас Account API Token (cfat_). Если деплой падает, замените на User API Token (cfut_) с тем же шаблоном прав."
              ;;
          esac
          CODE=$(curl -sS -o /tmp/cf_verify.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          if [ "$CODE" != "200" ]; then
            echo "::error::Cloudflare отклонил токен (HTTP ${CODE}). Обновите CLOUDFLARE_API_TOKEN (cfut_, не cfk_)."
            cat /tmp/cf_verify.json || true
            exit 1
          fi
          if ! grep -q '"success"[[:space:]]*:[[:space:]]*true' /tmp/cf_verify.json; then
            echo "::error::user/tokens/verify вернул success != true:"
            cat /tmp/cf_verify.json
            exit 1
          fi
          echo "Cloudflare API Token: verify OK"

      - run: npm ci

      - name: Build SPA
        env:
          VITE_HELLOWORD_BASE_URL: ${{ secrets.VITE_HELLOWORD_BASE_URL }}
        run: |
          if [ -z "$VITE_HELLOWORD_BASE_URL" ]; then
            echo "::warning::VITE_HELLOWORD_BASE_URL пуст — в проде ИИ не подключится. Задайте секрет в Settings → Secrets → Actions."
          fi
          npm run build

      - name: Wrangler version
        run: npx wrangler --version

      - name: Deploy papka2 (root wrangler.toml)
        run: npx wrangler deploy

      - name: Deploy helloword (--config из корня монорепо)
        run: npx wrangler deploy --config aibddck/helloword/wrangler.jsonc
